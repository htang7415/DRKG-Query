project:
  name: drkg_neo4j_vs_postgres
  random_seed: 784

paths:
  requirements_file: requirements.txt
  venv_dir: /tmp/drkg_neo4j_vs_postgres_venv
  raw_drkg: data/drkg.tsv
  relation_glossary: data/relation_glossary.tsv
  entity2src: data/entity2src.tsv
  preprocess_work_dir: /dev/shm/drkg_prepare
  results_dir: results
  setup_dir: results/01_setup
  prepare_dir: results/02_prepare
  experiments_dir: results/03_experiments
  analysis_dir: results/04_analysis
  final_dir: results/05_final
  env_dir: results/01_setup
  preprocess_dir: results/02_prepare/preprocess
  load_postgres_dir: results/02_prepare/load_postgres
  load_neo4j_dir: results/02_prepare/load_neo4j
  template_mining_dir: results/02_prepare/template_mining
  bindings_dir: results/02_prepare/bindings
  prepare_figures_dir: results/02_prepare/figures
  postgres_baseline_dir: results/03_experiments/postgres_baseline
  neo4j_baseline_dir: results/03_experiments/neo4j_baseline
  comparison_dir: results/03_experiments/engine_comparison
  join_order_dir: results/03_experiments/postgres_join_order
  experiments_figures_dir: results/03_experiments/figures
  theory_dir: results/04_analysis/theory
  analysis_summary_dir: results/04_analysis/summary
  analysis_figures_dir: results/04_analysis/figures

postgres:
  host: localhost
  port: 5432
  database: drkg_bench
  user: drkg_user
  password_env: PGPASSWORD
  password_value: drkg_local_password
  restart_command: bash scripts/dev_restart_postgres_docker.sh --config config.yaml
  disable_parallel_query: true
  max_parallel_workers_per_gather: 0
  shared_buffers: 4GB
  work_mem: 256MB
  maintenance_work_mem: 2GB
  effective_cache_size: 16GB
  nondefault_planner_settings: {}

neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password_env: NEO4J_PASSWORD
  password_value: drkg_local_password
  restart_command: bash scripts/dev_restart_neo4j_docker.sh --config config.yaml
  runtime: slotted
  prepend_cypher_runtime_slotted: true
  require_profile_runtime_slotted: true
  load_batch_size: 10000
  heap_size: 8g
  page_cache_size: 8g

relation_mapping:
  prefix: REL
  sanitize_non_alnum_to_underscore: true
  uppercase: true
  append_sha1_hex_chars: 8

preprocess:
  drop_empty_local_identifier: true
  deduplicate_exact_triples: true
  keep_self_loops_in_storage: true
  write_nodes_csv: true
  write_edges_csv: true
  write_relation_type_map: true

templates:
  anchor_variable_policy: first_node_variable
  min_grounded_matches: 100
  min_valid_anchors: 20
  select_path4_if_available: false
  path4_branch_and_bound_max_exact_evals: 256
  cycle4_branch_and_bound_max_exact_evals: 256
  length4_exact_eval_timeout_sec: 60
  select_num_triangles: 2
  select_four_cycle_if_available: true
  ranking:
    - grounded_match_count_desc
    - valid_anchor_count_desc
    - relation_type_pattern_tuple_lexicographic
    - endpoint_type_pattern_tuple_lexicographic

sampling:
  hub_top_fraction: 0.10
  baseline_bindings_per_template_regime: 20
  join_order_bindings_per_template_regime: 5
  without_replacement: true

benchmark:
  warmup_runs: 1
  measured_runs: 10
  instrumented_runs: 1
  plain_timeout_sec: 60
  instrumented_timeout_sec: 180
  restart_dbms_per_instance: true
  require_programmatic_restart: true
  try_flush_os_page_cache: true
  require_os_page_cache_attempt_log: true
  preserve_timing_if_only_instrumented_fails: true
  log_csv: true
  log_failure_details: true

system:
  page_cache_flush_command: null

services:
  mode: docker
  auto_start: true
  readiness_poll_interval_sec: 0.1
  docker:
    postgres_container: drkg-bench-postgres
    postgres_image: postgres:16
    postgres_port: 5432
    postgres_data_tmpfs: false
    postgres_data_tmpfs_size: 16g
    neo4j_container: drkg-bench-neo4j
    neo4j_image: neo4j:5.26.0-community
    neo4j_http_port: 7474
    neo4j_bolt_port: 7687
    neo4j_data_tmpfs: false
    neo4j_data_tmpfs_size: 16g
    neo4j_logs_tmpfs: false
    neo4j_logs_tmpfs_size: 1g

join_order:
  sql_shape: fully_parenthesized_left_deep
  join_collapse_limit: 1
  from_collapse_limit: 1
  include_2_edge_path: false
  use_cross_join_for_disconnected_prefix: true
  classify_connected_vs_cross_product: true

theory:
  build_join_hypergraph: true
  classify_acyclic_vs_cyclic: true
  agm_bound: optimal_fractional_edge_cover
  lp_solver: auto

validation:
  fixed_random_seed_required: true
  nominal_counts_if_four_cycle:
    baseline_instances: 480
    join_order_instances: 710

final_package:
  include_manifest: true
  include_config_snapshot: true
  include_final_tables: true
  include_final_figures: true

plotting:
  font_size: 16
  dpi: 600
  formats:
    - png
